services:
  - type: web
    name: main-phase-market-api
    runtime: node
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run ops:serve
    healthCheckPath: /api/local/health
    plan: starter
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: LOCAL_API_HOST
        value: 0.0.0.0
      - key: VITE_APP_BACKEND_PROVIDER
        value: local
      - key: ALLOW_REMOTE_CONNECTIONS
        value: "true"
      - key: MPM_RUNTIME_SITE_DATA_ROOT
        value: /tmp/main-phase-market/site-data
      - key: MPM_AUTOMATION_SCHEDULER_ENABLED
        value: "true"
      - key: MPM_EAGER_WARMUP_ENABLED
        value: "false"
      - key: ALLOWED_ORIGIN_HOSTS
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLIC_BUCKET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: USPS_CONSUMER_KEY
        sync: false
      - key: USPS_CONSUMER_SECRET
        sync: false
